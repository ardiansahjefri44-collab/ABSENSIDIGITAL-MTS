<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Madrasah</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- LOGIN -->
    <section id="login-page" class="page active">
      <div class="card">
        <h2>🕌 Login Petugas</h2>
        <form id="login-form" onsubmit="handleLogin(event); return false;">
          <input type="text" id="username" placeholder="Username" required autocomplete="off">
          <input type="password" id="password" placeholder="Password" required>
          <button type="submit">Masuk (Enter)</button>
        </form>
        <p id="login-msg" style="color:#dc2626; font-size:12px; margin-top:10px;"></p>
      </div>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard-page" class="page">
      <nav class="topbar">
        <h3 id="school-name">MA Darul Hikmah</h3>
        <div>
          <span id="user-role">Role</span>
          <button onclick="logout()">Keluar</button>
        </div>
      </nav>
      <div class="tabs">
        <button onclick="showTab('absen')">📝 Absensi</button>
        <button onclick="showTab('rekap')">📊 Rekap & AI</button>
        <button onclick="showTab('settings')">⚙️ Pengaturan</button>
      </div>

      <div id="tab-absen" class="tab-content active">
        <div class="card">
          <label>Tanggal: <input type="date" id="tgl-absen"></label>
          <label>Sesi: 
            <input type="checkbox" class="sesi-cb" value="1"> Jam 1
            <input type="checkbox" class="sesi-cb" value="2"> Jam 2
            <input type="checkbox" class="sesi-cb" value="3"> Jam 3
          </label>
          <form id="absen-form" onsubmit="simpanAbsen(event); return false;">
            <div class="input-group">
              <input type="text" id="scan-input" placeholder="Scan QR / RFID / Ketik NIS" autofocus required autocomplete="off">
              <select id="status-absen">
                <option value="Hadir">Hadir</option>
                <option value="Sakit">Sakit</option>
                <option value="Izin">Izin</option>
                <option value="Alpha">Alpha</option>
              </select>
            </div>
            <button type="submit">💾 Simpan (Enter)</button>
          </form>
          <button class="btn-danger" style="margin-top:10px;" onclick="kunciSesi()">🔒 Kunci Sesi Hari Ini</button>
        </div>
      </div>

      <div id="tab-rekap" class="tab-content">
        <div class="card">
          <h4>📈 Rekap & Analisis AI</h4>
          <p id="ai-loading">Memuat data...</p>
          <div id="ai-result"></div>
          <table id="rekap-table">
            <thead><tr><th>NIS</th><th>Tanggal</th><th>Sesi</th><th>Status</th></tr></thead>
            <tbody id="rekap-body"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-settings" class="tab-content">
        <div class="card">
          <h4>⚙️ Pengaturan Sistem</h4>
          <label>Google Sheets ID: <input type="text" id="set-sheet-id" placeholder="1aBcDeFg..."></label>
          <button onclick="setupDB()">🛠️ Setup Database</button>
          <hr>
          <label>Nama Madrasah: <input type="text" id="set-nama"></label>
          <label>Threshold Alpha Reguler: <input type="number" id="set-thr-reg" value="25"></label>
          <label>Threshold Alpha Khadim: <input type="number" id="set-thr-khad" value="100"></label>
          <label>AI API Key: <input type="password" id="set-ai-key"></label>
          <button onclick="simpanSettings()">💾 Simpan Pengaturan</button>
        </div>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
