<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Madrasah Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFBEB; }
        .islamic-pattern { background-image: radial-gradient(#0F766E 0.5px, transparent 0.5px); background-size: 20px 20px; opacity: 0.05; }
        .card { @apply bg-white p-6 rounded-2xl shadow-sm border border-amber-100; }
        .btn-primary { @apply bg-[#0F766E] text-white px-6 py-3 rounded-xl font-bold hover:bg-[#0D635C] transition-all active:scale-95 disabled:opacity-50; }
        .input-field { @apply w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#D97706] transition-all; }
        .tab-btn { @apply flex-1 py-4 text-center font-semibold text-gray-500 border-b-2 border-transparent transition-all; }
        .tab-btn.active { @apply text-[#0F766E] border-[#D97706] bg-amber-50/50; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 1rem; color: white; transform: translateY(200%); transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 9999; }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="islamic-pattern fixed inset-0 pointer-events-none"></div>

    <header class="bg-[#0F766E] text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] opacity-70 italic tracking-widest">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</p>
                <h1 id="ui-madrasah-name" class="text-xl font-bold tracking-tight uppercase">Absensi Madrasah</h1>
            </div>
            <div id="sync-status" class="flex items-center gap-2 bg-black/20 px-4 py-2 rounded-full text-xs">
                <div id="sync-dot" class="w-2 h-2 rounded-full bg-green-400"></div>
                <span id="sync-text">Tersinkron</span>
            </div>
        </div>
    </header>

    <main id="view-login" class="max-w-md mx-auto mt-20 px-4">
        <div class="card space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-800">Masuk Petugas</h2>
                <p class="text-sm text-gray-500">Silakan login untuk memulai absensi</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="input-field">
                <input type="password" id="password" placeholder="Password" class="input-field">
                <button onclick="handleLogin()" id="btn-login" class="btn-primary w-full">Masuk</button>
            </div>
        </div>
    </main>

    <main id="view-app" class="hidden max-w-4xl mx-auto mt-6 px-4 space-y-6">
        <nav class="flex bg-white rounded-2xl shadow-sm overflow-hidden border border-amber-100">
            <button onclick="switchTab('input')" id="tab-input" class="tab-btn active">Input</button>
            <button onclick="switchTab('rekap')" id="tab-rekap" class="tab-btn">Rekap</button>
            <button onclick="switchTab('config')" id="tab-config" class="tab-btn">Pengaturan</button>
        </nav>

        <!-- Tab: Input -->
        <section id="sec-input" class="space-y-6">
            <div class="card grid md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Tanggal</label>
                    <input type="date" id="ins-date" class="input-field mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Sesi</label>
                    <select id="ins-session" class="input-field mt-1">
                        <option value="1">Jam ke-1 (Pagi)</option>
                        <option value="2">Jam ke-2 (Siang)</option>
                        <option value="3">Jam ke-3 (Malam)</option>
                    </select>
                </div>
            </div>

            <div class="card border-2 border-[#0F766E]/20 bg-[#0F766E]/5">
                <div class="flex gap-2">
                    <input type="text" id="scan-input" placeholder="Scan QR / Ketik NIS..." 
                           class="flex-1 p-4 text-2xl font-mono text-center bg-white border-2 border-[#0F766E] rounded-2xl outline-none focus:ring-4 focus:ring-[#0F766E]/10">
                    <select id="ins-status" class="bg-white px-4 border rounded-2xl font-bold text-[#0F766E]">
                        <option value="Hadir">HADIR</option>
                        <option value="Sakit">SAKIT</option>
                        <option value="Izin">IZIN</option>
                        <option value="Alpha">ALPHA</option>
                    </select>
                </div>
                <p class="text-center text-[10px] text-gray-400 mt-3 font-semibold">ENTER OTOMATIS AKTIF</p>
            </div>

            <div class="card overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-gray-400 border-b">
                            <th class="pb-3">WAKTU</th>
                            <th class="pb-3">NIS</th>
                            <th class="pb-3 text-center">STATUS</th>
                            <th class="pb-3 text-right">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="list-recent" class="divide-y">
                        <!-- Data dinamis -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Tab: Rekap -->
        <section id="sec-rekap" class="hidden card">
            <h3 class="font-bold text-lg mb-4">Ringkasan Kehadiran</h3>
            <p class="text-sm text-gray-500 italic">Fitur rekapitulasi sedang dimuat dari Google Sheets...</p>
        </section>

        <!-- Tab: Pengaturan -->
        <section id="sec-config" class="hidden space-y-6">
            <div class="card space-y-4">
                <h3 class="font-bold text-[#0F766E]">Koneksi Database</h3>
                <div>
                    <label class="text-[10px] font-bold text-gray-400">GOOGLE SHEETS ID</label>
                    <input type="text" id="cfg-ssid" placeholder="Masukkan ID dari URL Sheets" class="input-field mt-1">
                </div>
                <div class="flex gap-2">
                    <button onclick="saveSheetId()" class="btn-primary flex-1">Simpan ID</button>
                    <button onclick="runSetup()" class="btn-primary bg-amber-600 hover:bg-amber-700">⚙️ Setup Database</button>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast shadow-2xl"></div>

    <script>
        const state = {
            user: null,
            ssId: localStorage.getItem('madrasah_ssid') || '',
            gasUrl: 'https://script.google.com/macros/s/AKfycbwOIowzp-NfJr3g5w7HOsdJ7OPfkNZzCd--PQZ_iuBPyId2ZAMuPZMQ32ohqK9V5sVYqA/exec',
            queue: JSON.parse(localStorage.getItem('absensi_pending') || '[]'),
            isOnline: navigator.onLine
        };

        window.onload = () => {
            document.getElementById('ins-date').valueAsDate = new Date();
            document.getElementById('cfg-ssid').value = state.ssId;
            
            document.getElementById('scan-input').addEventListener('keypress', e => {
                if (e.key === 'Enter') processEntry();
            });

            window.addEventListener('online', () => updateOnlineStatus(true));
            window.addEventListener('offline', () => updateOnlineStatus(false));
            
            renderRecent();
            updateOnlineStatus(navigator.onLine);
        };

        async function api(action, data = {}) {
            const body = JSON.stringify({ action, data: { ...data, ssId: state.ssId } });
            try {
                const response = await fetch(state.gasUrl, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk Apps Script
                    body: body
                });
                return { success: true }; // no-cors tidak bisa baca body, kita asumsikan sukses jika fetch jalan
            } catch (e) {
                return { success: false, message: e.toString() };
            }
        }

        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');

            if(!u || !p) return showToast("Isi username & password!", "#ef4444");

            btn.disabled = true;
            btn.innerText = "Mengecek...";

            try {
                const res = await fetch(state.gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', data: { username: u, password: p, ssId: state.ssId } })
                });
                const result = await res.json();

                if (result.success) {
                    state.user = result.user;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-app').classList.remove('hidden');
                    showToast("Ahlan wa Sahlan!", "#0F766E");
                    if (!state.ssId) {
                        switchTab('config');
                        showToast("Harap atur Sheet ID terlebih dahulu", "#D97706");
                    }
                } else {
                    showToast(result.message, "#ef4444");
                }
            } catch (e) {
                showToast("Gagal terhubung ke server", "#ef4444");
            } finally {
                btn.disabled = false;
                btn.innerText = "Masuk";
            }
        }

        function processEntry() {
            const nis = document.getElementById('scan-input').value.trim();
            if (!nis) return;

            const entry = {
                id: Date.now(),
                nis: nis,
                tanggal: document.getElementById('ins-date').value,
                sesi: document.getElementById('ins-session').value,
                status: document.getElementById('ins-status').value,
                petugas: state.user.username,
                timestamp: new Date().toISOString(),
                syncStatus: 'pending'
            };

            state.queue.unshift(entry);
            localStorage.setItem('absensi_pending', JSON.stringify(state.queue));
            
            document.getElementById('scan-input').value = '';
            document.getElementById('scan-input').focus();
            
            renderRecent();
            showToast("Data disimpan secara lokal", "#0F766E");
            
            if (state.isOnline) syncData();
        }

        async function syncData() {
            const pending = state.queue.filter(i => i.syncStatus === 'pending');
            if (pending.length === 0 || !state.isOnline) return;

            const res = await api('sync_pending', { queue: pending });
            if (res.success) {
                state.queue = state.queue.map(i => ({ ...i, syncStatus: 'synced' }));
                localStorage.setItem('absensi_pending', JSON.stringify(state.queue));
                renderRecent();
                updateOnlineStatus(true);
            }
        }

        function renderRecent() {
            const container = document.getElementById('list-recent');
            container.innerHTML = state.queue.slice(0, 10).map(item => `
                <tr class="hover:bg-gray-50">
                    <td class="py-4 text-[10px] text-gray-400 font-mono">${new Date(item.timestamp).toLocaleTimeString()}</td>
                    <td class="py-4 font-bold text-gray-700">${item.nis}</td>
                    <td class="py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold ${getStatusStyle(item.status)}">${item.status}</span>
                    </td>
                    <td class="py-4 text-right">${item.syncStatus === 'synced' ? '✅' : '⏳'}</td>
                </tr>
            `).join('');
        }

        function getStatusStyle(s) {
            if (s === 'Hadir') return 'bg-green-100 text-green-700';
            if (s === 'Alpha') return 'bg-red-100 text-red-700';
            return 'bg-amber-100 text-amber-700';
        }

        function saveSheetId() {
            const val = document.getElementById('cfg-ssid').value.trim();
            if (!val) return showToast("Masukkan ID!", "#ef4444");
            state.ssId = val;
            localStorage.setItem('madrasah_ssid', val);
            showToast("ID Tersimpan!", "#0F766E");
        }

        async function runSetup() {
            if (!state.ssId) return showToast("Simpan ID dulu!", "#ef4444");
            if (!confirm("Jalankan setup database?")) return;

            showToast("Menjalankan setup...", "#D97706");
            const res = await fetch(state.gasUrl, {
                method: 'POST',
                body: JSON.stringify({ action: 'setup_db', data: { ssId: state.ssId } })
            });
            const result = await res.json();
            showToast(result.message, result.success ? "#0F766E" : "#ef4444");
        }

        function switchTab(t) {
            ['input', 'rekap', 'config'].forEach(key => {
                document.getElementById(`sec-${key}`).classList.add('hidden');
                document.getElementById(`tab-${key}`).classList.remove('active');
            });
            document.getElementById(`sec-${t}`).classList.remove('hidden');
            document.getElementById(`tab-${t}`).classList.add('active');
        }

        function updateOnlineStatus(online) {
            state.isOnline = online;
            const dot = document.getElementById('sync-dot');
            const txt = document.getElementById('sync-text');
            const pendingCount = state.queue.filter(i => i.syncStatus === 'pending').length;

            if (!online) {
                dot.className = 'w-2 h-2 rounded-full bg-red-500';
                txt.innerText = 'Offline';
            } else if (pendingCount > 0) {
                dot.className = 'w-2 h-2 rounded-full bg-amber-500 animate-pulse';
                txt.innerText = `${pendingCount} Pending`;
                syncData();
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-green-400';
                txt.innerText = 'Tersinkron';
            }
        }

        function showToast(m, c) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.style.backgroundColor = c;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
