<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Foundation Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    :root{
      --emerald:#064e3b;
      --emerald-2:#065f46;
      --emerald-3:#047857;
      --bg:#f5f7f6;
      --card:rgba(255,255,255,.82);
      --stroke:rgba(15,23,42,.08);
      --text:#0f172a;
      --muted:#64748b;
      --danger:#be123c;
      --warning:#d97706;
      --success:#15803d;
      --info:#0369a1;
      --shadow:0 10px 30px rgba(2,6,23,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:"Plus Jakarta Sans",sans-serif;background:var(--bg);color:var(--text)}
    .glass{background:var(--card);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--stroke);box-shadow:var(--shadow)}
    .sidebar-link.active{background:#ecfdf5;color:var(--emerald);border-color:#a7f3d0}
    .sidebar-link{transition:.18s ease}
    .sidebar-link:hover{background:#f8fafc}
    .status-dot{width:10px;height:10px;border-radius:999px;display:inline-block}
    .table-wrap{overflow:auto}
    .modal{display:none}
    .modal.show{display:flex}
    .toast-stack{position:fixed;top:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:12px}
    .toast{min-width:280px;max-width:360px;padding:14px 16px;border-radius:18px;color:white;box-shadow:var(--shadow);animation:slideIn .22s ease}
    .toast.success{background:linear-gradient(135deg,#166534,#15803d)}
    .toast.error{background:linear-gradient(135deg,#9f1239,#be123c)}
    .toast.info{background:linear-gradient(135deg,#0f766e,#0369a1)}
    .toast.warning{background:linear-gradient(135deg,#b45309,#d97706)}
    @keyframes slideIn{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .hidden-scroll::-webkit-scrollbar{height:8px;width:8px}
    .hidden-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
    .chip{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;display:inline-flex;gap:6px;align-items:center}
    .badge-critical{background:#ffe4e6;color:#be123c}
    .badge-medium{background:#fef3c7;color:#b45309}
    .badge-light{background:#dcfce7;color:#15803d}
    .mobile-overlay{display:none}
    .mobile-overlay.show{display:block}
    .empty-state{border:1px dashed #cbd5e1;border-radius:24px;padding:32px;text-align:center;color:#64748b}
    .chart-box{position:relative;height:320px}
    .chart-box-sm{position:relative;height:260px}
    .status-btn{border:1px solid #cbd5e1;border-radius:12px;padding:8px 12px;font-weight:800;cursor:pointer;background:white}
    .status-btn.active-h{background:#dcfce7;color:#166534;border-color:#86efac}
    .status-btn.active-s{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}
    .status-btn.active-i{background:#fef3c7;color:#b45309;border-color:#fcd34d}
    .status-btn.active-a{background:#ffe4e6;color:#be123c;border-color:#fda4af}
    .session-check{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid #cbd5e1;border-radius:14px;background:white}
    .mini-card{border:1px solid #e2e8f0;border-radius:20px;padding:16px;background:white}
    .soft-btn{border:1px solid #cbd5e1;border-radius:16px;padding:10px 14px;background:#fff;font-weight:700;cursor:pointer}
    .soft-btn.primary{background:#064e3b;color:#fff;border-color:#064e3b}
    .soft-btn.danger{background:#fff1f2;color:#be123c;border-color:#fecdd3}
    .soft-btn.sky{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
    .soft-btn.amber{background:#fffbeb;color:#b45309;border-color:#fde68a}
    .checkbox-pill{display:inline-flex;gap:8px;align-items:center;padding:10px 12px;border:1px solid #cbd5e1;border-radius:16px;background:white}
    @media (max-width:1023px){
      .sidebar{position:fixed;inset:0 auto 0 0;width:290px;transform:translateX(-100%);transition:.2s ease;z-index:60}
      .sidebar.show{transform:translateX(0)}
      .mobile-overlay{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:50}
      .main-wrap{margin-left:0!important}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toastStack" class="toast-stack"></div>

  <script>
    const GASURL = "https://script.google.com/macros/s/AKfycbxYFLfh0TXg6kuQYxFwDPaa5ZcC-MH7POur_DhxrNC15_dxh0_5uYZHRE6PpwH5nuce/exec";
    const SESSIONKEY = "sfms_session_v2";

    const App = {
      state: {
        route: "dashboard",
        currentSession: null,
        db: {
          schools: [],
          classes: [],
          students: [],
          attendance: [],
          settings: [],
          users: [],
          teachers: [],
          subjects: [],
          teacherSubjects: [],
          teacherAttendance: [],
          studentArchives: []
        },
        charts: {},
        scanner: null,
        filters: {
          schoolId: "all",
          classId: "all",
          studentQuery: "",
          attendanceDate: today(),
          attendanceSessionNo: "1",
          reportMonth: yyyyMmToday(),
          dashboardMonth: yyyyMmToday(),
          scannerDate: today(),
          scannerSessions: ["1"],
          promotionFromClassId: "all",
          promotionToClassId: "all",
          archiveSchoolId: "all"
        }
      }
    };

    function today() { return new Date().toISOString().slice(0, 10); }
    function yyyyMmToday() { return new Date().toISOString().slice(0, 7); }
    function safeParse(raw, fallback) { try { return JSON.parse(raw ?? ""); } catch { return fallback; } }
    function readSession() { return safeParse(localStorage.getItem(SESSIONKEY), null); }
    function writeSession(session) { localStorage.setItem(SESSIONKEY, JSON.stringify(session)); }
    function clearSession() { localStorage.removeItem(SESSIONKEY); }

    function toast(message, type = "info") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.innerHTML = `
        <div class="font-semibold mb-1">${type === "success" ? "Berhasil" : type === "error" ? "Gagal" : type === "warning" ? "Perhatian" : "Info"}</div>
        <div class="text-sm opacity-90">${message}</div>
      `;
      document.getElementById("toastStack").appendChild(el);
      setTimeout(() => el.remove(), 3600);
    }

    function fmtDate(v) {
      if (!v) return "-";
      return new Intl.DateTimeFormat("id-ID", { dateStyle: "medium" }).format(new Date(v));
    }

    function fmtDateTime(v) {
      if (!v) return "-";
      return new Intl.DateTimeFormat("id-ID", { dateStyle: "medium", timeStyle: "short" }).format(new Date(v));
    }

    function schoolById(id) { return App.state.db.schools.find(x => String(x.id) === String(id)); }
    function classById(id) { return App.state.db.classes.find(x => String(x.id) === String(id)); }
    function teacherById(id) { return App.state.db.teachers.find(x => String(x.id) === String(id)); }
    function studentById(id) { return App.state.db.students.find(x => String(x.id) === String(id)); }
    function isSuper() { return App.state.currentSession?.role === "superadmin"; }

    function scopedSchools() {
      if (isSuper()) return App.state.db.schools;
      return App.state.db.schools.filter(s => String(s.id) === String(App.state.currentSession?.schoolid));
    }

    function scopedClasses() {
      if (isSuper()) return App.state.db.classes;
      return App.state.db.classes.filter(c => String(c.schoolid) === String(App.state.currentSession?.schoolid));
    }

    function scopedStudents() {
      if (isSuper()) return App.state.db.students;
      return App.state.db.students.filter(s => String(s.schoolid) === String(App.state.currentSession?.schoolid));
    }

    function scopedTeachers() {
      if (isSuper()) return App.state.db.teachers;
      return App.state.db.teachers.filter(t => String(t.schoolid) === String(App.state.currentSession?.schoolid));
    }

    function scopedSubjects() {
      if (isSuper()) return App.state.db.subjects;
      return App.state.db.subjects.filter(s => String(s.schoolid) === String(App.state.currentSession?.schoolid));
    }

    function scopedAttendance() {
      if (isSuper()) return App.state.db.attendance;
      return App.state.db.attendance.filter(a => String(a.schoolid) === String(App.state.currentSession?.schoolid));
    }

    function scopedTeacherAttendance() {
      if (isSuper()) return App.state.db.teacherAttendance;
      return App.state.db.teacherAttendance.filter(a => String(a.schoolid) === String(App.state.currentSession?.schoolid));
    }

    function scopedArchives() {
      if (isSuper()) return App.state.db.studentArchives;
      return App.state.db.studentArchives.filter(a => String(a.schoolid) === String(App.state.currentSession?.schoolid));
    }

    function activeSchoolFilterValue() {
      return isSuper() ? App.state.filters.schoolId : App.state.currentSession?.schoolid;
    }

    function filteredClasses() {
      const sid = activeSchoolFilterValue();
      return scopedClasses().filter(c => sid === "all" || String(c.schoolid) === String(sid));
    }

    function filteredStudents() {
      const sid = activeSchoolFilterValue();
      const q = App.state.filters.studentQuery.trim().toLowerCase();
      const cid = App.state.filters.classId;
      return scopedStudents().filter(s => {
        const schoolMatch = sid === "all" || String(s.schoolid) === String(sid);
        const classMatch = cid === "all" || String(s.classid) === String(cid);
        const queryMatch = !q || String(s.fullname).toLowerCase().includes(q) || String(s.nis).toLowerCase().includes(q);
        return schoolMatch && classMatch && queryMatch;
      });
    }

    async function api(action, payload = {}) {
      if (!GASURL) throw new Error("GAS URL belum diatur");
      const res = await fetch(GASURL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, payload })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message || "Request gagal");
      return json;
    }

    async function refreshBootstrap() {
      const json = await api("bootstrap", { session: App.state.currentSession });
      App.state.db = json.data;
    }

    async function boot() {
      App.state.currentSession = readSession();
      if (!App.state.currentSession) return render();
      try {
        await refreshBootstrap();
      } catch (err) {
        clearSession();
        App.state.currentSession = null;
        toast(err.message, "error");
      }
      render();
    }

    async function login(username, password) {
      const json = await api("login", { username, password });
      App.state.currentSession = json.session;
      writeSession(json.session);
      await refreshBootstrap();
      App.state.route = "dashboard";
      location.hash = "#dashboard";
      toast(`Selamat datang, ${json.session.name}.`, "success");
      render();
    }

    function logout() {
      clearSession();
      App.state.currentSession = null;
      destroyAllCharts();
      stopScanner();
      location.hash = "";
      render();
    }

    function destroyAllCharts() {
      Object.values(App.state.charts).forEach(c => c && typeof c.destroy === "function" && c.destroy());
      App.state.charts = {};
    }

    function destroyChart(id) {
      if (App.state.charts[id]) {
        App.state.charts[id].destroy();
        delete App.state.charts[id];
      }
    }

    function renderChart(id, type, data, options = {}) {
      const el = document.getElementById(id);
      if (!el) return;
      destroyChart(id);
      App.state.charts[id] = new Chart(el, {
        type,
        data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: true } },
          ...options
        }
      });
    }

    function navLink(route, icon, label) {
      const active = App.state.route === route ? "active" : "";
      return `
        <a href="#${route}" class="sidebar-link ${active} flex items-center gap-3 rounded-2xl border border-transparent px-4 py-3 text-sm font-semibold text-slate-700">
          <i data-lucide="${icon}" class="h-4 w-4"></i>${label}
        </a>
      `;
    }

    function pageTitle() {
      return ({
        dashboard: "Dashboard",
        students: "Manajemen Siswa",
        classes: "Manajemen Kelas",
        attendance: "Absensi Siswa",
        scanner: "QR Scanner",
        teachers: "Guru & Mapel",
        teacherattendance: "Absensi Guru",
        reports: "Laporan",
        promotion: "Kenaikan & Kelulusan",
        archives: "Arsip Siswa",
        settings: "Pengaturan"
      })[App.state.route] || "Dashboard";
    }

    function schoolFilterHtml() {
      if (!isSuper()) return "";
      const options = [
        `<option value="all">Semua Sekolah</option>`,
        ...App.state.db.schools.map(s => `<option value="${s.id}" ${App.state.filters.schoolId === s.id ? "selected" : ""}>${s.name}</option>`)
      ].join("");
      return `<select id="globalSchoolFilter" class="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700">${options}</select>`;
    }

    function renderLogin() {
      return `
        <main class="min-h-screen grid lg:grid-cols-2 bg-slate-50">
          <section class="hidden lg:flex p-10 bg-gradient-to-br from-emerald-950 via-emerald-900 to-emerald-700 text-white">
            <div class="max-w-xl m-auto">
              <div class="inline-flex items-center gap-3 rounded-full border border-white/20 px-4 py-2 text-sm text-emerald-50/90">
                <span class="h-2.5 w-2.5 rounded-full bg-emerald-300"></span>
                Multi-tenant · Spreadsheet Center · AI Ready
              </div>
              <h1 class="mt-6 text-5xl font-extrabold leading-tight">Smart Foundation Management System</h1>
              <p class="mt-5 text-emerald-50/80 text-lg">Platform manajemen yayasan sekolah modern dengan dashboard realtime, absensi hybrid, QR scanner, guru-mapel, AI counselor, kelulusan, dan arsip siswa.</p>
            </div>
          </section>
          <section class="p-6 md:p-10 flex items-center justify-center">
            <div class="w-full max-w-xl">
              <div class="mb-8">
                <div class="inline-flex items-center gap-3 rounded-2xl bg-emerald-50 px-4 py-3 text-emerald-800 font-semibold">SFMS Login Portal</div>
                <h2 class="mt-6 text-3xl font-extrabold text-slate-900">Masuk ke sistem</h2>
                <p class="mt-2 text-slate-500">Gunakan akun yang ada di spreadsheet backend.</p>
              </div>
              <div class="glass rounded-[28px] p-6 md:p-8 bg-white">
                <form id="loginForm" class="space-y-4">
                  <div>
                    <label class="mb-2 block text-sm font-semibold text-slate-700">Username</label>
                    <input name="username" required class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100" placeholder="misal superadmin">
                  </div>
                  <div>
                    <label class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
                    <input type="password" name="password" required class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100" placeholder="123456">
                  </div>
                  <button class="w-full rounded-2xl bg-emerald-900 px-4 py-3 font-bold text-white hover:bg-emerald-800">Masuk</button>
                </form>
              </div>
            </div>
          </section>
        </main>
      `;
    }

    function renderShell() {
      const user = App.state.currentSession;
      const school = schoolById(user?.schoolid);
      return `
        <div class="min-h-screen">
          <div id="mobileOverlay" class="mobile-overlay"></div>
          <aside id="sidebar" class="sidebar glass fixed left-0 top-0 z-40 flex h-screen w-[300px] flex-col bg-white/86 border-r border-slate-200 p-5">
            <div class="flex items-center gap-3">
              <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-emerald-900 text-white shadow-lg font-black">SF</div>
              <div>
                <div class="text-sm font-bold text-slate-900">Smart Foundation</div>
                <div class="text-xs text-slate-500">Management System</div>
              </div>
            </div>

            <div class="mt-6 rounded-3xl bg-emerald-950 p-4 text-white">
              <div class="text-xs uppercase tracking-[0.18em] text-emerald-200">Login aktif</div>
              <div class="mt-2 font-bold">${user?.name || "-"}</div>
              <div class="text-sm text-emerald-100/80">${user?.role || "-"}</div>
              <div class="mt-3 text-xs text-emerald-100/75">${user?.schoolid ? (school?.name || "-") : "Semua sekolah"}</div>
            </div>

            <nav class="mt-6 flex-1 space-y-2 overflow-auto hidden-scroll">
              ${navLink("dashboard","layout-dashboard","Dashboard")}
              ${navLink("students","users","Siswa")}
              ${navLink("classes","school","Kelas")}
              ${navLink("attendance","clipboard-check","Absensi Siswa")}
              ${navLink("scanner","scan-line","QR Scanner")}
              ${navLink("teachers","book-user","Guru & Mapel")}
              ${navLink("teacherattendance","badge-check","Absensi Guru")}
              ${navLink("reports","bar-chart-3","Laporan")}
              ${navLink("promotion","arrow-up-circle","Kenaikan & Kelulusan")}
              ${navLink("archives","archive","Arsip Siswa")}
              ${navLink("settings","settings","Pengaturan")}
            </nav>

            <div class="space-y-3 pt-4 border-t border-slate-200">
              <button id="logoutBtn" class="w-full rounded-2xl bg-slate-100 px-4 py-3 text-sm font-bold text-slate-700 hover:bg-slate-200">Keluar</button>
            </div>
          </aside>

          <div class="main-wrap ml-[300px]">
            <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/80 backdrop-blur-xl">
              <div class="flex items-center justify-between gap-4 px-4 py-4 md:px-8">
                <div class="flex items-center gap-3">
                  <button id="menuBtn" class="lg:hidden inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white">
                    <i data-lucide="menu"></i>
                  </button>
                  <div>
                    <div class="text-xs uppercase tracking-[0.22em] text-slate-400">SFMS Workspace</div>
                    <div class="text-xl font-extrabold text-slate-900">${pageTitle()}</div>
                  </div>
                </div>
                <div class="flex items-center gap-3">
                  ${schoolFilterHtml()}
                  <div class="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-600">${fmtDateTime(new Date())}</div>
                </div>
              </div>
            </header>
            <main id="pageContent" class="p-4 md:p-8"></main>
          </div>
        </div>
      `;
    }

    function statCard(label, value) {
      return `<div class="glass rounded-[28px] p-5 bg-white"><div class="text-sm font-medium text-slate-500">${label}</div><div class="mt-3 text-3xl font-extrabold text-slate-900">${value}</div></div>`;
    }

    function renderDashboard() {
      return `
        <section class="space-y-6">
          <div class="glass rounded-[28px] p-5 bg-white">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
              <div>
                <h3 class="text-lg font-extrabold">Filter dashboard</h3>
                <p class="text-sm text-slate-500">Bandingkan bulan ini dengan bulan sebelumnya per kelas dan per sekolah.</p>
              </div>
              <input id="dashboardMonthInput" type="month" value="${App.state.filters.dashboardMonth}" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
            </div>
          </div>
          <div id="dashboardSummary" class="grid gap-4 md:grid-cols-2 xl:grid-cols-4"></div>
          <div class="grid gap-6 xl:grid-cols-2">
            <div class="glass rounded-[28px] p-5 bg-white">
              <div class="mb-4"><h3 class="text-lg font-extrabold">Perbandingan kelas</h3><p class="text-sm text-slate-500">Presentase hadir bulan ini dibanding bulan lalu.</p></div>
              <div class="chart-box"><canvas id="classComparisonChart"></canvas></div>
            </div>
            <div class="glass rounded-[28px] p-5 bg-white">
              <div class="mb-4"><h3 class="text-lg font-extrabold">Perbandingan sekolah</h3><p class="text-sm text-slate-500">Performa tiap sekolah.</p></div>
              <div class="chart-box"><canvas id="schoolComparisonChart"></canvas></div>
            </div>
          </div>
        </section>
      `;
    }

    function renderStudents() {
      const classes = filteredClasses();
      const students = filteredStudents();
      const classOptions = [`<option value="all">Semua kelas</option>`, ...classes.map(c => `<option value="${c.id}" ${App.state.filters.classId === c.id ? "selected" : ""}>${c.name}</option>`)].join("");
      return `
        <section class="space-y-6">
          <div class="glass rounded-[28px] p-5 bg-white">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
              <div><h3 class="text-lg font-extrabold">Master data siswa</h3><p class="text-sm text-slate-500">Data aktif siswa per sekolah.</p></div>
              <button id="refreshStudentsBtn" class="soft-btn primary">Refresh data</button>
            </div>
            <div class="mt-5 grid gap-3 md:grid-cols-[1.2fr,.8fr]">
              <input id="studentSearchInput" value="${App.state.filters.studentQuery}" placeholder="Cari nama atau NIS" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
              <select id="studentClassFilter" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">${classOptions}</select>
            </div>
          </div>
          <div class="glass rounded-[28px] p-5 bg-white">
            <div class="table-wrap hidden-scroll">
              <table class="min-w-full text-sm">
                <thead><tr class="border-b border-slate-100 text-left text-slate-500"><th class="px-4 py-3">Nama</th><th class="px-4 py-3">NIS</th><th class="px-4 py-3">JK</th><th class="px-4 py-3">Kelas</th><th class="px-4 py-3">Sekolah</th></tr></thead>
                <tbody>
                  ${students.length ? students.map(s => `
                    <tr class="border-b border-slate-50">
                      <td class="px-4 py-3 font-semibold">${s.fullname}</td>
                      <td class="px-4 py-3">${s.nis}</td>
                      <td class="px-4 py-3">${s.gender}</td>
                      <td class="px-4 py-3">${classById(s.classid)?.name || "-"}</td>

    function renderRoute() {
      const content = document.getElementById("pageContent");
      if (!content) return;
      const map = {
        dashboard: renderDashboard,
        students: renderStudents,
        classes: renderClasses,
        attendance: renderAttendance,
        scanner: renderScanner,
        teachers: renderTeachers,
        teacherattendance: renderTeacherAttendance,
        reports: renderReports,
        promotion: renderPromotion,
        archives: renderArchives,
        settings: renderSettings
      };
      const fn = map[App.state.route] || renderDashboard;
      content.innerHTML = fn();
      bindRouteEvents();
      lucide.createIcons();
      if (App.state.route === "dashboard") loadDashboard();
      if (App.state.route === "reports") loadMonthlyReport();
    }

    function render() {
      destroyAllCharts();
      const root = document.getElementById("app");
      if (!App.state.currentSession) {
        root.innerHTML = renderLogin();
        bindLogin();
        lucide.createIcons();
        return;
      }
      App.state.route = location.hash.replace("#", "") || App.state.route || "dashboard";
      root.innerHTML = renderShell();
      bindShellEvents();
      renderRoute();
      lucide.createIcons();
    }

    function bindLogin() {
      document.getElementById("loginForm")?.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        try { await login(fd.get("username"), fd.get("password")); } catch (err) { toast(err.message, "error"); }
      });
    }

    function bindShellEvents() {
      document.getElementById("logoutBtn").onclick = logout;
      const menuBtn = document.getElementById("menuBtn");
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("mobileOverlay");
      if (menuBtn) menuBtn.onclick = () => { sidebar.classList.add("show"); overlay.classList.add("show"); };
      if (overlay) overlay.onclick = () => { sidebar.classList.remove("show"); overlay.classList.remove("show"); };

      const filter = document.getElementById("globalSchoolFilter");
      if (filter) {
        filter.value = App.state.filters.schoolId;
        filter.onchange = (e) => {
          App.state.filters.schoolId = e.target.value;
          App.state.filters.classId = "all";
          renderRoute();
        };
      }

      window.onhashchange = () => {
        App.state.route = location.hash.replace("#", "") || "dashboard";
        stopScanner();
        renderRoute();
      };
    }

    function collectAttendancePayload() {
      return filteredStudents().map(s => {
        const activeBtn = document.querySelector(`[data-status-group="${s.id}"] .status-btn[class*="active-"]`);
        const status = activeBtn?.dataset.attStatus || "A";
        const note = document.querySelector(`[data-att-note="${s.id}"]`)?.value || "";
        return { studentid: s.id, status, notes: note };
      });
    }

    function bindAttendanceButtons() {
      document.querySelectorAll("[data-att-status]").forEach(btn => {
        btn.onclick = () => {
          const studentId = btn.dataset.studentId;
          const wrap = document.querySelector(`[data-status-group="${studentId}"]`);
          wrap.querySelectorAll(".status-btn").forEach(x => x.classList.remove("active-h","active-s","active-i","active-a"));
          btn.classList.add(`active-${btn.dataset.attStatus.toLowerCase()}`);
        };
      });
    }

    function selectedPromotionStudents() {
      return [...document.querySelectorAll("[data-student-pick]:checked")].map(x => x.value);
    }

    function downloadCsv(filename, rows) {
      if (!rows.length) return toast("Tidak ada data untuk didownload.", "warning");
      const headers = Object.keys(rows[0]);
      const csv = [
        headers.join(","),
        ...rows.map(r => headers.map(h => `"${String(r[h] ?? "").replace(/"/g, '""')}"`).join(","))
      ].join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function bindRouteEvents() {
      document.getElementById("studentSearchInput")?.addEventListener("input", e => { App.state.filters.studentQuery = e.target.value; renderRoute(); });
      document.getElementById("studentClassFilter")?.addEventListener("change", e => { App.state.filters.classId = e.target.value; renderRoute(); });
      document.getElementById("refreshStudentsBtn")?.addEventListener("click", async () => {
        try { await refreshBootstrap(); renderRoute(); toast("Data siswa diperbarui.", "success"); } catch (err) { toast(err.message, "error"); }
      });

      document.getElementById("attendanceDateInput")?.addEventListener("change", e => { App.state.filters.attendanceDate = e.target.value; renderRoute(); });
      document.getElementById("attendanceSessionSelect")?.addEventListener("change", e => { App.state.filters.attendanceSessionNo = e.target.value; renderRoute(); });
      document.getElementById("saveAttendanceBtn")?.addEventListener("click", async () => {
        try {
          await api("saveStudentAttendanceBulk", {
            date: App.state.filters.attendanceDate,
            sessionno: App.state.filters.attendanceSessionNo,
            source: "manual",
            items: collectAttendancePayload()
          });
          await refreshBootstrap();
          renderRoute();
          toast("Absensi siswa berhasil disimpan.", "success");
        } catch (err) { toast(err.message, "error"); }
      });
      bindAttendanceButtons();

      document.getElementById("dashboardMonthInput")?.addEventListener("change", async e => { App.state.filters.dashboardMonth = e.target.value; await loadDashboard(); });

      document.querySelectorAll("[data-scanner-session]").forEach(chk => {
        chk.addEventListener("change", () => { App.state.filters.scannerSessions = [...document.querySelectorAll("[data-scanner-session]:checked")].map(x => x.value); });
      });
      document.getElementById("scannerDateInput")?.addEventListener("change", e => { App.state.filters.scannerDate = e.target.value; });
      document.getElementById("startScannerBtn")?.addEventListener("click", startScanner);
      document.getElementById("stopScannerBtn")?.addEventListener("click", stopScanner);
      document.getElementById("manualScanBtn")?.addEventListener("click", async () => {
        const nis = document.getElementById("manualScanInput")?.value?.trim();
        if (!nis) return toast("Masukkan NIS terlebih dahulu.", "warning");
        await processScan(nis);
      });

      document.getElementById("loadReportBtn")?.addEventListener("click", async () => { await loadMonthlyReport(); });
      document.getElementById("reportMonthInput")?.addEventListener("change", e => { App.state.filters.reportMonth = e.target.value; });

      document.getElementById("settingsForm")?.addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const fd = new FormData(e.target);
          await api("updateSettings", Object.fromEntries(fd.entries()));
          await refreshBootstrap();
          renderRoute();
          toast("Pengaturan berhasil disimpan.", "success");
        } catch (err) { toast(err.message, "error"); }
      });

      document.querySelectorAll("[data-teacher-att]").forEach(btn => {
        btn.addEventListener("click", async () => {
          try {
            const teacherid = btn.dataset.teacherAtt;
            const status = btn.dataset.status;
            const mode = btn.dataset.mode;
            const t = teacherById(teacherid);
            await api("saveTeacherAttendance", { teacherid, date: today(), schoolid: t.schoolid, status, mode });
            await refreshBootstrap();
            renderRoute();
            toast("Absensi guru tersimpan.", "success");
          } catch (err) { toast(err.message, "error"); }
        });
      });

      document.getElementById("promotionFromClassId")?.addEventListener("change", e => { App.state.filters.promotionFromClassId = e.target.value; renderRoute(); });
      document.getElementById("promotionToClassId")?.addEventListener("change", e => { App.state.filters.promotionToClassId = e.target.value; });

      document.getElementById("promoteSelectedBtn")?.addEventListener("click", async () => {
        try {
          const ids = selectedPromotionStudents();
          if (!ids.length) return toast("Pilih minimal satu siswa.", "warning");
          if (App.state.filters.promotionToClassId === "all") return toast("Pilih kelas tujuan.", "warning");
          await api("promoteStudents", {
            schoolid: activeSchoolFilterValue(),
            fromclassid: App.state.filters.promotionFromClassId,
            toclassid: App.state.filters.promotionToClassId,
            studentids: ids,
            createdby: App.state.currentSession?.name || ""
          });
          await refreshBootstrap();
          renderRoute();
          toast("Siswa berhasil dinaikkan kelas.", "success");
        } catch (err) { toast(err.message, "error"); }
      });

      document.getElementById("graduateSelectedBtn")?.addEventListener("click", async () => {
        try {
          const ids = selectedPromotionStudents();
          if (!ids.length) return toast("Pilih minimal satu siswa.", "warning");
          await api("graduateStudents", {
            schoolid: activeSchoolFilterValue(),
            fromclassid: App.state.filters.promotionFromClassId,
            studentids: ids,
            reason: "Lulus",
            createdby: App.state.currentSession?.name || ""
          });
          await refreshBootstrap();
          renderRoute();
          toast("Siswa berhasil diluluskan dan diarsipkan.", "success");
        } catch (err) { toast(err.message, "error"); }
      });

      document.querySelectorAll("[data-archive-single]").forEach(btn => {
        btn.addEventListener("click", async () => {
          try {
            await api("archiveStudents", {
              schoolid: activeSchoolFilterValue(),
              studentids: [btn.dataset.archiveSingle],
              reason: "Arsip manual"
            });
            await refreshBootstrap();
            renderRoute();
            toast("Siswa berhasil diarsipkan.", "success");
          } catch (err) { toast(err.message, "error"); }
        });
      });

      document.querySelectorAll("[data-delete-archive]").forEach(btn => {
        btn.addEventListener("click", async () => {
          try {
            await api("deleteStudentArchive", { id: btn.dataset.deleteArchive });
            await refreshBootstrap();
            renderRoute();
            toast("Arsip berhasil dihapus.", "success");
          } catch (err) { toast(err.message, "error"); }
        });
      });

      document.getElementById("downloadArchiveBtn")?.addEventListener("click", () => {
        const rows = scopedArchives().filter(a => activeSchoolFilterValue() === "all" || String(a.schoolid) === String(activeSchoolFilterValue()));
        downloadCsv(`arsip-siswa-${today()}.csv`, rows);
      });
    }

    async function loadDashboard() {
      try {
        const json = await api("getDashboardAnalytics", {
          session: App.state.currentSession,
          schoolid: activeSchoolFilterValue(),
          month: App.state.filters.dashboardMonth
        });
        const d = json.data;
        const summaryWrap = document.getElementById("dashboardSummary");
        if (summaryWrap) {
          summaryWrap.innerHTML = [
            statCard("Total Siswa", d.summary.students),
            statCard("Record Absensi", d.summary.attendanceRecords),
            statCard("Present Rate", `${d.summary.presentRate}%`),
            statCard("Alpha", d.summary.alphaCount)
          ].join("");
        }

        renderChart("classComparisonChart", "bar", {
          labels: d.classComparison.map(x => x.classname),
          datasets: [
            { label: "Bulan ini", data: d.classComparison.map(x => x.currentPresentRate), backgroundColor: "#0f766e", borderRadius: 12 },
            { label: "Bulan lalu", data: d.classComparison.map(x => x.previousPresentRate), backgroundColor: "#38bdf8", borderRadius: 12 }
          ]
        });

        renderChart("schoolComparisonChart", "bar", {
          labels: d.schoolComparison.map(x => x.schoolname),
          datasets: [
            { label: "Present Rate", data: d.schoolComparison.map(x => x.presentRate), backgroundColor: "#16a34a", borderRadius: 12 },
            { label: "Alpha", data: d.schoolComparison.map(x => x.alphaCount), backgroundColor: "#e11d48", borderRadius: 12 }
          ]
        });
      } catch (err) { toast(err.message, "error"); }
    }

    async function loadMonthlyReport() {
      try {
        const json = await api("getMonthlyReport", {
          session: App.state.currentSession,
          schoolid: activeSchoolFilterValue(),
          month: App.state.filters.reportMonth
        });

        const classes = json.data.classes || [];
        const allRows = classes.flatMap(c => ([
          { type: "H", value: c.summary.hadir, name: c.classname },
          { type: "S", value: c.summary.sakit, name: c.classname },
          { type: "I", value: c.summary.izin, name: c.classname },
          { type: "A", value: c.summary.alpha, name: c.classname }
        ]));

        const pie = {
          H: allRows.filter(x => x.type === "H").reduce((a,b) => a + b.value, 0),
          S: allRows.filter(x => x.type === "S").reduce((a,b) => a + b.value, 0),
          I: allRows.filter(x => x.type === "I").reduce((a,b) => a + b.value, 0),
          A: allRows.filter(x => x.type === "A").reduce((a,b) => a + b.value, 0)
        };

        renderChart("attendancePieChart", "doughnut", {
          labels: ["Hadir","Sakit","Izin","Alpha"],
          datasets: [{ data: [pie.H, pie.S, pie.I, pie.A], backgroundColor: ["#16a34a","#0284c7","#f59e0b","#e11d48"] }]
        });

        renderChart("alphaByClassChart", "bar", {
          labels: classes.map(c => c.classname),
          datasets: [{ label: "Alpha", data: classes.map(c => c.summary.alpha), backgroundColor: "#e11d48", borderRadius: 12 }]
        });

        const wrap = document.getElementById("reportTableWrap");
        wrap.innerHTML = `
          <div class="space-y-6">
            ${classes.map(c => `
              <div class="rounded-3xl border border-slate-100 p-5">
                <div class="flex flex-col gap-2 lg:flex-row lg:items-center lg:justify-between">
                  <div><div class="text-lg font-extrabold">${c.classname}</div><div class="text-sm text-slate-500">${c.schoolname} · Present rate ${c.summary.presentRate}% · Batas alpha ujian ${c.summary.alphaLimit}</div></div>
                  <div class="chip ${c.summary.alpha >= c.summary.alphaLimit ? "badge-critical" : "badge-light"}">Alpha ${c.summary.alpha}</div>
                </div>
                <div class="mt-4 table-wrap">
                  <table class="min-w-full text-sm">
                    <thead><tr class="border-b border-slate-100 text-left text-slate-500"><th class="px-4 py-3">Nama</th><th class="px-4 py-3">NIS</th><th class="px-4 py-3">Alpha</th><th class="px-4 py-3">Status ujian</th></tr></thead>
                    <tbody>
                      ${c.students.map(s => `<tr class="border-b border-slate-50"><td class="px-4 py-3 font-semibold">${s.name}</td><td class="px-4 py-3">${s.nis}</td><td class="px-4 py-3">${s.alpha}</td><td class="px-4 py-3">${s.statusExam}</td></tr>`).join("")}
                    </tbody>
                  </table>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      } catch (err) { toast(err.message, "error"); }
    }

    async function processScan(nis) {
      try {
        const sessions = App.state.filters.scannerSessions;
        if (!sessions.length) return toast("Pilih minimal satu sesi.", "warning");
        await api("scanStudentAttendance", { nis, sessions, date: App.state.filters.scannerDate });
        await refreshBootstrap();
        if (document.getElementById("manualScanInput")) document.getElementById("manualScanInput").value = "";
        renderRoute();
        toast(`Scan berhasil untuk NIS ${nis}.`, "success");
      } catch (err) { toast(err.message, "error"); }
    }

    async function startScanner() {
      try {
        if (App.state.scanner) return;
        App.state.scanner = new Html5Qrcode("qr-reader");
        await App.state.scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 220 },
          async decodedText => { await processScan(decodedText); },
          () => {}
        );
        toast("Kamera aktif. Scan massal siap digunakan.", "success");
      } catch (err) { toast(err.message, "error"); }
    }

    async function stopScanner() {
      try {
        if (App.state.scanner) {
          await App.state.scanner.stop();
          await App.state.scanner.clear();
          App.state.scanner = null;
          const qr = document.getElementById("qr-reader");
          if (qr) qr.innerHTML = "";
          toast("Kamera dimatikan.", "info");
        }
      } catch (err) {}
    }

    boot();
  </script>
</body>
</html>
